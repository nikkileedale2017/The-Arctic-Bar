<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Job Sheet | The Arctic Bar</title><link rel="stylesheet" href="styles.css"></head><body><header class="nav noPrint"><a href="index.html" class="brand"><img src="logo.jpg"></a><nav><a href="admin.html">Back to admin</a></nav></header><main><section class="panel job"><h1>Job sheet</h1><div id="jobSheet"></div><h2>Setup checklist</h2><div class="checklist"><label><input type="checkbox"> Slush machines loaded</label><label><input type="checkbox"> Slush mix loaded</label><label><input type="checkbox"> Cups / straws / napkins packed</label><label><input type="checkbox"> Extension leads / lighting packed</label><label><input type="checkbox"> Float / card reader ready</label><label><input type="checkbox"> Trailer / bar cleaned</label><label><input type="checkbox"> Arrival and setup complete</label></div><button class="btn noPrint" onclick="window.print()">Print job sheet</button></section></main><script>
window.ARCTIC_CONFIG = {
  businessName: 'The Arctic Bar',
  phones: ['07594 141231','07787 895618'],
  socials: { instagram: '#thearcticbar1', facebook: '@thearcticbar' },
  adminPassword: 'Arctic2026',
  packages: [
    {name:'Bronze', price:250, desc:'1 double tank machine, 12 litres ready mixed slush, max 4 hours, trailer not included'},
    {name:'Silver', price:400, desc:'2 double tank machines, 24 litres ready mixed slush, max 4 hours, trailer not included'},
    {name:'Gold', price:550, desc:'3 double tank machines, 36 litres ready mixed slush, max 4 hours, trailer included'},
    {name:'Platinum', price:700, desc:'4 double tank machines, 48 litres ready mixed slush, max 4 hours, trailer included'},
    {name:'Diamond', price:1000, desc:'4 machines, 48–96 litres ready mixed slush, trailer, seating, pick n mix and 2 bartenders included'},
    {name:'Custom', price:0, poa:true, desc:'Bespoke package to suit your event'}
  ],
  upgrades: [
    {name:'Personalised Cups', price:2, unit:'from £2 per cup'},
    {name:'Novelty Cups', price:2, unit:'from £2 per cup'},
    {name:'DJ', price:150},
    {name:'LED Shorts & Shots', price:45},
    {name:'Pop Up Bar', price:0, poa:true},
    {name:'LED Lighting All Around', price:0, poa:true},
    {name:'Candy Floss Machine', price:95},
    {name:'Popcorn Machine', price:95},
    {name:'Cake Stand Hire', price:0, poa:true},
    {name:'Sweet Cart', price:95},
    {name:'Pick N Mix', price:0, poa:true},
    {name:'Pub Snacks', price:0, poa:true},
    {name:'Variety of Soft Drinks', price:0, poa:true},
    {name:'Canned Cocktails', price:0, poa:true},
    {name:'Extra Bartenders', price:50, unit:'per bartender'},
    {name:'Extra Slush Mix', price:40, unit:'per 6 litre mix'},
    {name:'Happy Hour Sourz', price:50},
    {name:'Test Tube Shots', price:50},
    {name:'Shot Carousel 61 Mini Shots', price:70}
  ]
};

const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const money = n => '£' + Number(n || 0).toFixed(2);
const storeKey = 'arcticBookingsV2';
const menuBtn = $('#menuBtn'), menu = $('#menu'); if(menuBtn && menu) menuBtn.onclick=()=>menu.classList.toggle('open');
function bookings(){return JSON.parse(localStorage.getItem(storeKey)||'[]')}
function saveBookings(list){localStorage.setItem(storeKey, JSON.stringify(list))}
function uid(){return 'AB-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase()}
function isAcceptedOnDate(date){return bookings().some(b=>b.eventDate===date && ['accepted','deposit paid','paid in full'].includes((b.status||'').toLowerCase()))}
function initBooking(){ if(!window.ARCTIC_CONFIG || !$('#bookingForm')) return; const pkgBox=$('#packages'), upBox=$('#upgrades');
ARCTIC_CONFIG.packages.forEach((p,i)=>pkgBox.insertAdjacentHTML('beforeend',`<label class="choice"><input type="radio" name="package" value="${i}"><b>${p.name}</b><span>${p.desc}</span><strong>${p.poa?'POA':money(p.price)}</strong></label>`));
ARCTIC_CONFIG.upgrades.forEach((u,i)=>upBox.insertAdjacentHTML('beforeend',`<label class="choice"><input type="checkbox" name="upgrade" value="${i}"><b>${u.name}</b><span>${u.unit||''}</span><strong>${u.poa?'POA':money(u.price)}</strong></label>`));
const dateInput=$('#eventDate'), dateWarning=$('#dateWarning');
function selectedLines(){let total=0, lines=[], poa=[]; const pv=document.querySelector('input[name="package"]:checked'); if(pv){const p=ARCTIC_CONFIG.packages[pv.value]; if(!p.poa) total+=p.price; else poa.push(p.name); lines.push(`${p.name} - ${p.poa?'POA':money(p.price)}`)} $$('input[name="upgrade"]:checked').forEach(c=>{const u=ARCTIC_CONFIG.upgrades[c.value]; if(!u.poa) total+=u.price; else poa.push(u.name); lines.push(`${u.name} - ${u.poa?'POA':money(u.price)}`)}); return {total,lines,poa}}
const calc=()=>{let {total,lines}=selectedLines(); const f=new FormData($('#bookingForm')); const extraHours=+f.get('extraHours')||0, bars=+f.get('extraBartenders')||0, travel=+f.get('travel')||0, deposit=+f.get('deposit')||0; if(extraHours){total += extraHours*50; lines.push(`Extra hours x ${extraHours} - ${money(extraHours*50)}`)} if(bars){total += bars*50; lines.push(`Additional bartenders x ${bars} - ${money(bars*50)}`)} if(travel){total += travel; lines.push(`Travel surcharge - ${money(travel)}`)} $('#summaryItems').innerHTML = lines.length ? lines.map(x=>`<p>${x}</p>`).join('') : '<p>No selections yet.</p>'; $('#total').textContent=money(total); $('#balance').textContent=money(Math.max(total-deposit,0)); return total};
$$('input,textarea').forEach(i=>i.addEventListener('change', calc)); $$('input').forEach(i=>i.addEventListener('input', calc)); calc();
dateInput.addEventListener('change',()=>{dateWarning.textContent = isAcceptedOnDate(dateInput.value) ? 'This date is already accepted/booked in your admin records. Choose another date or check admin.' : ''});
$('#bookingForm').addEventListener('submit', e=>{e.preventDefault(); if(isAcceptedOnDate(dateInput.value) && !confirm('This date is already accepted/booked. Save enquiry anyway?')) return; const fd=new FormData(e.target); const data=Object.fromEntries(fd.entries()); const sel=selectedLines(); data.id=uid(); data.created=new Date().toLocaleString(); data.status='enquiry'; data.total=calc(); data.balance=Math.max(data.total-(+data.deposit||0),0); data.packageName = data.package!==undefined && ARCTIC_CONFIG.packages[data.package] ? ARCTIC_CONFIG.packages[data.package].name : ''; data.upgradeNames = $$('input[name="upgrade"]:checked').map(c=>ARCTIC_CONFIG.upgrades[c.value].name); data.summary=sel.lines; const list=bookings(); list.push(data); saveBookings(list); alert('Booking saved. Open Admin to accept it, print a job sheet, or mark deposit paid.'); location.href='admin.html';});}
function initAdmin(){ if(!$('#adminPanel')) return; const login=$('#loginPanel'), panel=$('#adminPanel'); $('#loginBtn').onclick=()=>{if($('#adminPass').value===ARCTIC_CONFIG.adminPassword){login.classList.add('hidden');panel.classList.remove('hidden');renderAdmin()}else alert('Wrong password')}; $('#searchBookings').addEventListener('input', renderAdmin); $('#clearBtn').onclick=()=>{if(confirm('Delete all saved bookings on this browser?')){saveBookings([]);renderAdmin()}}; $('#exportBtn').onclick=exportCSV;}
function renderAdmin(){const root=$('#bookingsTable'); if(!root)return; const q=($('#searchBookings')?.value||'').toLowerCase(); let list=bookings().filter(b=>JSON.stringify(b).toLowerCase().includes(q)).sort((a,b)=>(a.eventDate||'').localeCompare(b.eventDate||'')); root.innerHTML=list.length?'':'<p>No bookings saved yet.</p>'; list.forEach(b=>{const card=document.createElement('div'); card.className='adminCard'; card.innerHTML=`<h3>${b.name||'Customer'} — ${b.eventDate||'No date'} <span class="status">${b.status||'enquiry'}</span></h3><div class="adminGrid"><p><b>Phone:</b><br>${b.phone||''}</p><p><b>Venue:</b><br>${b.venue||''}</p><p><b>Total:</b><br>${money(b.total)} | Balance ${money(b.balance)}</p><p><b>Package:</b><br>${b.packageName||''}</p><p><b>Upgrades:</b><br>${(b.upgradeNames||[]).join(', ')||'None'}</p><p><b>Created:</b><br>${b.created||''}</p></div><label>Status<select data-status="${b.id}"><option>enquiry</option><option>accepted</option><option>deposit paid</option><option>paid in full</option><option>completed</option><option>declined</option><option>cancelled</option></select></label><a class="btn" href="job-sheet.html?id=${encodeURIComponent(b.id)}">Open job sheet</a><button class="btn ghost" data-print="${b.id}">Quick print</button><button class="btn danger" data-del="${b.id}">Delete</button>`; root.appendChild(card); card.querySelector('select').value=b.status||'enquiry';});
$$('[data-status]').forEach(s=>s.onchange=()=>{const list=bookings(); const b=list.find(x=>x.id===s.dataset.status); if(b){b.status=s.value; saveBookings(list); renderAdmin()}}); $$('[data-del]').forEach(btn=>btn.onclick=()=>{if(confirm('Delete this booking?')){saveBookings(bookings().filter(b=>b.id!==btn.dataset.del));renderAdmin()}}); $$('[data-print]').forEach(btn=>btn.onclick=()=>{location.href='job-sheet.html?id='+encodeURIComponent(btn.dataset.print)});}
function exportCSV(){const list=bookings(); const rows=[['id','status','name','phone','email','eventDate','eventTime','venue','package','upgrades','total','deposit','balance']]; list.forEach(b=>rows.push([b.id,b.status,b.name,b.phone,b.email,b.eventDate,b.eventTime,b.venue,b.packageName,(b.upgradeNames||[]).join('; '),b.total,b.deposit,b.balance])); const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='arctic-bar-bookings.csv'; a.click();}
function initJob(){const el=$('#jobSheet'); if(!el)return; const id=new URLSearchParams(location.search).get('id'); const b=bookings().find(x=>x.id===id); if(!b){el.innerHTML='<p>Booking not found on this browser.</p>';return} const rows=[['Booking ID',b.id],['Status',b.status],['Customer',b.name],['Phone',b.phone],['Email',b.email],['Home address',b.address],['Event type',b.eventType],['Event date',b.eventDate],['Start time',b.eventTime],['Venue / location',b.venue],['Guests',b.guests],['Package',b.packageName],['Upgrades',(b.upgradeNames||[]).join(', ')],['Extra hours',b.extraHours],['Additional bartenders',b.extraBartenders],['Travel surcharge',money(b.travel)],['Total',money(b.total)],['Deposit paid',money(b.deposit)],['Balance due',money(b.balance)],['Notes',b.notes]]; el.innerHTML=rows.map(([k,v])=>`<div class="jobRow"><b>${k}</b><span>${v||''}</span></div>`).join('')}
initBooking(); initAdmin(); initJob();

</script></body></html>
